<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>兵种百科 — 断箭 BROKEN ARROW</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-icon">BA</div>
    <span class="nav-logo-text">BROKEN <span>ARROW</span></span>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">首页</a></li>
    <li><a href="factions.html">阵营</a></li>
    <li><a href="units.html" class="active">兵种</a></li>
    <li><a href="controls.html">操作指南</a></li>
    <li><a href="https://store.steampowered.com/app/1604270/Broken_Arrow/" target="_blank" rel="noopener" class="">游戏</a></li>
  </ul>
  <div class="nav-status">COMBAT SYSTEM ONLINE</div>
</nav>

<div class="page-content">

  <!-- 页面英雄区 -->
  <div class="page-hero">
    <div class="page-hero-bg"></div>
    <div class="container page-hero-content">
      <div class="breadcrumb">
        <a href="index.html">首页</a>
        <span class="breadcrumb-sep">›</span>
        <span>兵种百科</span>
      </div>
      <div class="section-tag" style="margin-bottom:12px">UNIT DATABASE</div>
      <h1 class="section-title" style="font-size:clamp(28px,4vw,52px);margin-bottom:12px">兵种百科全书</h1>
      <p class="section-desc">
        收录美国与俄罗斯双方全部354种单位，覆盖七大兵种类别与十大专精，
        包含完整装备配件详解。可按阵营、类别、专精三维筛选。
      </p>
    </div>
  </div>

  <!-- 筛选区 -->
  <section style="padding:32px 0 0">
    <div class="container">
      <div class="filters-section">

        <!-- 阵营筛选 -->
        <div class="filter-label">— 阵营筛选</div>
        <div class="filter-bar" style="margin-bottom:20px">
          <button class="filter-btn faction-btn active" data-faction="all">
            🌐 全部阵营
          </button>
          <button class="filter-btn faction-btn" data-faction="usa">
            🇺🇸 美国
          </button>
          <button class="filter-btn faction-btn" data-faction="russia">
            🇷🇺 俄罗斯
          </button>
        </div>

        <!-- 兵种类别筛选 -->
        <div class="filter-label">— 兵种类别</div>
        <div class="filter-bar" style="margin-bottom:20px">
          <button class="filter-btn active" data-cat="all">📋 全部类别</button>
          <button class="filter-btn" data-cat="侦察">👁 侦察</button>
          <button class="filter-btn" data-cat="步兵">🪖 步兵</button>
          <button class="filter-btn" data-cat="战斗载具">🚂 战斗载具</button>
          <button class="filter-btn" data-cat="支援">🎯 支援</button>
          <button class="filter-btn" data-cat="后勤">📦 后勤</button>
          <button class="filter-btn" data-cat="直升机">🚁 直升机</button>
          <button class="filter-btn" data-cat="空袭">✈ 空袭</button>
        </div>

        <!-- 专精筛选 -->
        <div class="filter-label">— 专精筛选</div>
        <div class="filter-bar" id="spec-filter-bar">
          <button class="filter-btn spec-btn active" data-spec="all">🎯 全部专精</button>
          <button class="filter-btn spec-btn" data-spec="marine" data-sfaction="usa">⚓ 海军陆战队</button>
          <button class="filter-btn spec-btn" data-spec="armor" data-sfaction="usa">🛡 装甲旅</button>
          <button class="filter-btn spec-btn" data-spec="airborne" data-sfaction="usa">🪂 空降步兵</button>
          <button class="filter-btn spec-btn" data-spec="stryker" data-sfaction="usa">🚗 斯特赖克骑兵</button>
          <button class="filter-btn spec-btn" data-spec="socom" data-sfaction="usa">🎖 特种作战</button>
          <button class="filter-btn spec-btn" data-spec="motor" data-sfaction="russia">🚶 摩托化步兵</button>
          <button class="filter-btn spec-btn" data-spec="armored" data-sfaction="russia">🛡 装甲集团军</button>
          <button class="filter-btn spec-btn" data-spec="vdv" data-sfaction="russia">🪂 空降军</button>
          <button class="filter-btn spec-btn" data-spec="naval" data-sfaction="russia">⚓ 海军步兵</button>
          <button class="filter-btn spec-btn" data-spec="spetsnaz" data-sfaction="russia">🎖 特种部队</button>
        </div>
      </div>
    </div>
  </section>

  <!-- 兵种区块（分类分组） -->
  <section style="padding:16px 0 80px">
    <div class="container">
      <div class="units-count" id="units-count">加载中…</div>
      <!-- script.js 按分类渲染 cat-section > cat-section-header + units-grid -->
      <div id="units-grid"></div>
    </div>
  </section>

</div>

<footer>
  <div class="container">
    <div class="footer-inner">
      <div class="footer-text">© BROKEN ARROW · STEEL BALALAIKA × SLITHERINE · 本站为非官方粉丝页面</div>
      <ul class="footer-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="factions.html">阵营</a></li>
        <li><a href="units.html">兵种</a></li>
      </ul>
    </div>
  </div>
</footer>

<!-- 兵种数据与筛选逻辑 -->
<script src="script.js"></script>
<script>
(function(){
  var btn=document.createElement('button');
  btn.className='hamburger';btn.setAttribute('aria-label','菜单');
  btn.innerHTML='<span></span><span></span><span></span>';
  var nav=document.querySelector('.navbar'),links=document.querySelector('.nav-links');
  if(!nav||!links)return;
  nav.appendChild(btn);
  btn.addEventListener('click',function(){btn.classList.toggle('open');links.classList.toggle('open');});
  links.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){btn.classList.remove('open');links.classList.remove('open');});});
})();
</script>
</body>
</html>
